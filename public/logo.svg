<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 290" width="290" height="290">

  <!-- Red cluster spans x:49-241, y:49-241 -->
  <!-- Bracket thickness: 28px, Bracket arm length: 70px -->
  <!-- Each bracket inner-corner aligns with outer corner of red cluster -->

  <!-- Top-left corner bracket -->
  <!-- horizontal: starts at outer-left (x=21), ends at x=49+70=119, y=21, height=28 → inner bottom edge at y=49 -->
  <rect x="21" y="21" width="70" height="28" fill="#1a3a6b"/>
  <!-- vertical: x=21, starts at y=21, down 70px → inner right edge at x=49 -->
  <rect x="21" y="21" width="28" height="70" fill="#1a3a6b"/>

  <!-- Top-right corner bracket -->
  <!-- horizontal: ends at x=269 (21+248), starts at 269-70=199, top at y=21 -->
  <rect x="199" y="21" width="70" height="28" fill="#1a3a6b"/>
  <!-- vertical: right edge at x=269, width 28 → x=241, from y=21 down 70 -->
  <rect x="241" y="21" width="28" height="70" fill="#1a3a6b"/>

  <!-- Bottom-left corner bracket -->
  <!-- horizontal: bottom edge at y=269, height 28 → top at y=241, x=21 width 70 -->
  <rect x="21" y="241" width="70" height="28" fill="#1a3a6b"/>
  <!-- vertical: x=21 width 28, bottom at y=269 → top at y=199 (269-70) -->
  <rect x="21" y="199" width="28" height="70" fill="#1a3a6b"/>

  <!-- Bottom-right corner bracket -->
  <!-- horizontal: x=199, bottom at y=269 -->
  <rect x="199" y="241" width="70" height="28" fill="#1a3a6b"/>
  <!-- vertical: x=241, top at y=199 -->
  <rect x="241" y="199" width="28" height="70" fill="#1a3a6b"/>

  <!-- Centre red square (sharp corners) -->
  <rect x="113" y="113" width="64" height="64" fill="#e52b2b"/>

  <!-- Top-left red square -->
  <rect x="49" y="49" width="64" height="64" fill="#e52b2b"/>

  <!-- Top-right red square -->
  <rect x="177" y="49" width="64" height="64" fill="#e52b2b"/>

  <!-- Bottom-left red square -->
  <rect x="49" y="177" width="64" height="64" fill="#e52b2b"/>

  <!-- Bottom-right red square -->
  <rect x="177" y="177" width="64" height="64" fill="#e52b2b"/>

</svg>