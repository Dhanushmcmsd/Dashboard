<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 290" width="290" height="290">

  <!--
    Pixel-accurate from reference image (286x358, content 248x248):
    Canvas      : 290x290, transparent background
    Navy color  : #083674  (sampled rgb(8,54,116))
    Red color   : #e8231e  (vivid red, JPEG-compressed in reference)

    Bracket L-shape (each corner):
      arm thickness : 30px
      arm length    : 50px (outer corner to inner corner)
      inner corner  : aligns with outer corner of nearest red square

    Red squares (49x49, touching with 1px gap):
      TL : (71,  71 )
      TR : (170, 71 )
      C  : (121, 121)
      BL : (71,  170)
      BR : (170, 170)
  -->

  <!-- ═══ TOP-LEFT BRACKET ═══ -->
  <!-- horiz arm: x=21 to 71, y=21 to 51 -->
  <rect x="21" y="21" width="50" height="30" fill="#083674"/>
  <!-- vert arm:  x=21 to 51, y=21 to 71 -->
  <rect x="21" y="21" width="30" height="50" fill="#083674"/>

  <!-- ═══ TOP-RIGHT BRACKET ═══ -->
  <!-- horiz arm: x=219 to 269, y=21 to 51 -->
  <rect x="219" y="21" width="50" height="30" fill="#083674"/>
  <!-- vert arm:  x=239 to 269, y=21 to 71 -->
  <rect x="239" y="21" width="30" height="50" fill="#083674"/>

  <!-- ═══ BOTTOM-LEFT BRACKET ═══ -->
  <!-- horiz arm: x=21 to 71, y=239 to 269 -->
  <rect x="21" y="239" width="50" height="30" fill="#083674"/>
  <!-- vert arm:  x=21 to 51, y=219 to 269 -->
  <rect x="21" y="219" width="30" height="50" fill="#083674"/>

  <!-- ═══ BOTTOM-RIGHT BRACKET ═══ -->
  <!-- horiz arm: x=219 to 269, y=239 to 269 -->
  <rect x="219" y="239" width="50" height="30" fill="#083674"/>
  <!-- vert arm:  x=239 to 269, y=219 to 269 -->
  <rect x="239" y="219" width="30" height="50" fill="#083674"/>

  <!-- ═══ RED SQUARES (49x49) ═══ -->
  <!-- Top-left -->
  <rect x="71"  y="71"  width="49" height="49" fill="#e8231e"/>
  <!-- Top-right -->
  <rect x="170" y="71"  width="49" height="49" fill="#e8231e"/>
  <!-- Centre -->
  <rect x="121" y="121" width="49" height="49" fill="#e8231e"/>
  <!-- Bottom-left -->
  <rect x="71"  y="170" width="49" height="49" fill="#e8231e"/>
  <!-- Bottom-right -->
  <rect x="170" y="170" width="49" height="49" fill="#e8231e"/>

</svg>
